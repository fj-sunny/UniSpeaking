<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>FreeTalk</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; color: #1d2129; padding: 24px; line-height: 1.6; }

        .container { max-width: 800px; margin: 0 auto; }

        h1 { font-size: 22px; font-weight: 600; margin-bottom: 20px; color: #1d2129; }

        /* Sticky top bar */
        .sticky-top { position: sticky; top: 0; z-index: 100; background: #f5f7fa; margin: 0 -24px 16px; padding: 12px 24px; border-bottom: 1px solid transparent; transition: border-color .2s; }
        .sticky-top.scrolled { border-bottom-color: #e5e6eb; }

        /* Toolbar */
        .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
        .toolbar label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #4e5969; cursor: pointer; }

        /* Buttons */
        button { padding: 8px 18px; font-size: 13px; font-weight: 500; border: 1px solid #c9cdd4; border-radius: 6px; background: #fff; color: #1d2129; cursor: pointer; transition: all .15s; }
        button:hover:not(:disabled) { border-color: #165dff; color: #165dff; }
        button:disabled { opacity: .4; cursor: not-allowed; }
        .btn-primary { background: #165dff; border-color: #165dff; color: #fff; }
        .btn-primary:hover:not(:disabled) { background: #4080ff; border-color: #4080ff; color: #fff; }
        .btn-danger { border-color: #f53f3f; color: #f53f3f; }
        .btn-danger:hover:not(:disabled) { background: #f53f3f; color: #fff; }

        /* Status indicator */
        .status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 8px; background: #fff; border: 1px solid #e5e6eb; font-size: 13px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #c9cdd4; flex-shrink: 0; }
        .status-dot.connected { background: #00b42a; }
        .status-dot.connecting { background: #ff7d00; animation: pulse 1s infinite; }
        .status-dot.error { background: #f53f3f; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

        /* SDP card */
        .card { background: #fff; border: 1px solid #e5e6eb; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
        .card-title { font-size: 13px; font-weight: 600; color: #4e5969; margin-bottom: 8px; }
        .step-num { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; background: #165dff; color: #fff; font-size: 11px; font-weight: 600; margin-right: 6px; }
        .card-hint { font-size: 12px; color: #86909c; margin-top: 6px; }

        textarea { width: 100%; font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace; font-size: 12px; padding: 10px; border: 1px solid #e5e6eb; border-radius: 6px; resize: vertical; background: #f7f8fa; color: #1d2129; transition: border-color .15s; }
        textarea:focus { outline: none; border-color: #165dff; background: #fff; }
        input[type="text"] { width: 100%; font-size: 13px; padding: 9px 10px; border: 1px solid #e5e6eb; border-radius: 6px; background: #f7f8fa; color: #1d2129; }
        input[type="text"]:focus { outline: none; border-color: #165dff; background: #fff; }
        .field-label { display: block; font-size: 12px; color: #4e5969; margin: 10px 0 4px; }
        .char-count { float: right; color: #86909c; font-weight: 400; }

        /* Conversation */
        .conversation-card { padding: 0; overflow: hidden; }
        .conversation-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border-bottom: 1px solid #e5e6eb; }
        .conversation-title { font-size: 15px; font-weight: 600; }
        .conversation-subtitle { color: #86909c; font-size: 12px; }
        .level-badge { display: inline-flex; margin-left: 6px; padding: 1px 7px; border-radius: 999px; background: #e8f3ff; color: #165dff; font-size: 11px; font-weight: 600; vertical-align: 1px; }
        .chat-list { height: 380px; overflow-y: auto; padding: 18px; background: #f7f8fa; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
        .chat-empty { margin: auto; max-width: 360px; color: #86909c; font-size: 13px; text-align: center; }
        .message-row { display: flex; flex-direction: column; max-width: 82%; }
        .message-row.user { align-self: flex-end; align-items: flex-end; }
        .message-row.assistant { align-self: flex-start; align-items: flex-start; }
        .message-label { color: #86909c; font-size: 11px; margin: 0 6px 4px; }
        .message-bubble { padding: 10px 13px; border-radius: 14px; font-size: 15px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
        .message-row.user .message-bubble { color: #fff; background: #165dff; border-bottom-right-radius: 4px; }
        .message-row.assistant .message-bubble { color: #1d2129; background: #fff; border: 1px solid #e5e6eb; border-bottom-left-radius: 4px; }
        .message-row.partial .message-bubble::after { content: " ●"; color: #ff7d00; font-size: 9px; animation: pulse 1s infinite; }
        .conversation-actions { display: flex; gap: 8px; flex-shrink: 0; }

        /* Video */
        .video-section { margin-bottom: 16px; }
        .video-label { font-size: 13px; color: #86909c; margin-bottom: 6px; }
        video { width: 320px; max-width: 100%; background: #000; border-radius: 8px; display: block; }

        /* Events panel */
        .events-title { font-size: 14px; font-weight: 600; color: #1d2129; margin-bottom: 10px; }
        .events-container { display: flex; flex-direction: column; gap: 6px; }
        .event-item { background: #fff; border: 1px solid #e5e6eb; border-radius: 8px; overflow: hidden; }
        .event-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; user-select: none; font-size: 12px; }
        .event-header:hover { background: #f7f8fa; }
        .event-arrow { font-size: 14px; font-weight: 700; width: 18px; text-align: center; }
        .event-arrow.server { color: #00b42a; }
        .event-arrow.client { color: #165dff; }
        .event-label { color: #4e5969; }
        .event-time { color: #c9cdd4; margin-left: auto; font-size: 11px; }
        .event-body { display: none; padding: 10px 12px; background: #f7f8fa; border-top: 1px solid #e5e6eb; }
        .event-body pre { margin: 0; font-size: 11px; font-family: "SF Mono", Menlo, Consolas, monospace; color: #4e5969; white-space: pre-wrap; word-break: break-all; }
        .events-empty { font-size: 13px; color: #c9cdd4; padding: 16px 0; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>FreeTalk</h1>

    <div class="sticky-top">
        <div class="toolbar">
            <button id="startBtn" class="btn-primary">Start Session</button>
            <button id="endBtn" class="btn-danger" disabled>End Session</button>
            <label>
                <input id="sendVideoCheckbox" type="checkbox" />
                Enable Video
            </label>
        </div>

        <div class="status-bar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Ready</span>
            <span id="levelBadge" class="level-badge">CET-4 (B1-B2)</span>
        </div>
    </div>

    <section class="card conversation-card" aria-label="Live conversation">
        <div class="conversation-head">
            <div>
                <div class="conversation-title">Live conversation</div>
                <div class="conversation-subtitle">Your speech and the AI reply appear here in real time.</div>
            </div>
            <div class="conversation-actions">
                <button id="newConversationBtn">New conversation</button>
            </div>
        </div>
        <div id="chatList" class="chat-list" aria-live="polite">
            <div class="chat-empty">Start a session to begin a free chat with AI.</div>
        </div>
    </section>

    <div class="video-section" id="videoSection" style="display:none;">
        <div class="video-label">Local Video Preview</div>
        <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <div hidden>
        <button id="setAnswerBtn" disabled></button>
        <button id="downloadBtn" disabled></button>
        <button id="copyOfferBtn" disabled></button>
        <textarea id="promptBox" maxlength="2000"></textarea>
        <span id="promptCount"></span>
        <textarea id="offerBox"></textarea>
        <textarea id="answerBox"></textarea>
        <div id="events"></div>
    </div>
</div>

<script>
    const eventsDiv = document.getElementById('events');
    const startBtn = document.getElementById('startBtn');
    const setAnswerBtn = document.getElementById('setAnswerBtn');
    const endBtn = document.getElementById('endBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const copyOfferBtn = document.getElementById('copyOfferBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const chatList = document.getElementById('chatList');
    const newConversationBtn = document.getElementById('newConversationBtn');
    const levelBadge = document.getElementById('levelBadge');

    const sendVideoCheckbox = document.getElementById('sendVideoCheckbox');
    const localVideo = document.getElementById('localVideo');

    const offerBox = document.getElementById('offerBox');
    const answerBox = document.getElementById('answerBox');
    const promptBox = document.getElementById('promptBox');
    const promptCount = document.getElementById('promptCount');
    const API_BASE = window.__API_BASE__ || 'http://127.0.0.1:8000';

    promptBox.addEventListener('input', () => {
      promptCount.textContent = `${promptBox.value.length} / ${promptBox.maxLength}`;
    });

    let pc = null;
    let sessionId = null;
    let conversationId = localStorage.getItem('englishCoachConversationId');
    if (conversationId && !/^[A-Za-z0-9_-]{8,64}$/.test(conversationId)) {
      localStorage.removeItem('englishCoachConversationId');
      conversationId = null;
    }
    let sessionConfig = null;
    let hiddenRemoteAudioEl = null;

    let mediaRecorder = null;
    let recordedChunks = [];
    let audioBlob = null;

    let localStream = null;

    let sendCanvas = null;
    let sendCanvasCtx = null;
    let sendCanvasStream = null;
    let sendRafId = 0;

    let gatedAudioTracks = [];
    let gatedVideoTracks = [];
    let audioSender = null;
    let videoSender = null;
    let audioTrack = null;
    let videoTrack = null;
    const chatMessages = new Map();
    const chatOrder = [];
    const processedToolCallIds = new Set();
    const pendingEventWrites = new Set();
    const pendingLatencyWrites = new Set();
    let finalizingSession = false;
    let turnSequence = 0;
    let currentLatency = null;
    let lastResponseCreatedAt = 0;
    let transcriptionFallbackTimer = 0;
    let remoteAudioContext = null;
    let remoteAudioSource = null;
    let remoteAudioAnalyser = null;
    let remoteAudioMonitorRaf = 0;
    let remoteAudioAudible = false;
    let remoteAudioSilenceFrames = 0;
    let qualityStatsTimer = 0;
    let sessionStartedAt = 0;
    let qualityStats = null;
    let activeUserItemId = null;

    function setStatus(text, state) {
      statusText.textContent = text;
      statusDot.className = 'status-dot' + (state ? ' ' + state : '');
    }

    function gateMedia(on) {
      for (const t of gatedAudioTracks) t.enabled = !!on;
      for (const t of gatedVideoTracks) t.enabled = !!on;
    }

    function sendUpdate(channel) {
      if (!sessionConfig) throw new Error('Session config is unavailable');
      const update = {
        event_id: `event_${Date.now()}`,
        type: "session.update",
        session: sessionConfig,
      };
      if (channel && channel.readyState === "open") {
        channel.send(JSON.stringify(update));
        pushEventFromDataChannel(update);
      }
    }

    async function apiRequest(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, options);
      const contentType = response.headers.get('content-type') || '';
      const body = contentType.includes('application/json')
        ? await response.json()
        : await response.text();
      if (!response.ok) {
        const message = typeof body === 'object' ? body.error : body;
        throw new Error(message || `API request failed (${response.status})`);
      }
      return body;
    }

    async function createBackendSession() {
      return apiRequest('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt: promptBox.value.trim(),
          conversation_id: conversationId,
        }),
      });
    }

    function rememberEvent(eventObj) {
      if (!sessionId) return;
      const request = fetch(`${API_BASE}/api/sessions/${encodeURIComponent(sessionId)}/events`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ event: eventObj }),
      }).catch((error) => {
        console.warn('Failed to save session event:', error);
      }).finally(() => {
        pendingEventWrites.delete(request);
      });
      pendingEventWrites.add(request);
    }

    function renderConversation(history = []) {
      chatMessages.clear();
      chatOrder.length = 0;
      history.forEach((message, index) => {
        const key = `history:${index}:${message.source_id || ''}`;
        chatMessages.set(key, {
          role: message.role,
          text: message.text,
          final: true,
        });
        chatOrder.push(key);
      });
      renderChatMessages();
    }

    function renderChatMessages() {
      chatList.innerHTML = '';
      if (!chatOrder.length) {
        const empty = document.createElement('div');
        empty.className = 'chat-empty';
        empty.textContent = "Start a session and speak naturally. Your words and the AI reply will appear here in real time.";
        chatList.appendChild(empty);
        return;
      }

      for (const key of chatOrder) {
        const message = chatMessages.get(key);
        if (!message?.text) continue;
        const row = document.createElement('div');
        row.className = `message-row ${message.role}${message.final ? '' : ' partial'}`;

        const label = document.createElement('div');
        label.className = 'message-label';
        label.textContent = message.role === 'user' ? 'You' : 'AI';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.textContent = message.text;

        row.appendChild(label);
        row.appendChild(bubble);
        chatList.appendChild(row);
      }
      chatList.scrollTop = chatList.scrollHeight;
    }

    function upsertChatMessage(key, role, text, final, append = false) {
      if (!text) return;
      const existing = chatMessages.get(key);
      if (!existing) chatOrder.push(key);
      chatMessages.set(key, {
        role,
        text: append && existing ? existing.text + text : text,
        final: !!final,
      });
      renderChatMessages();
    }

    function rekeyChatMessage(oldKey, newKey) {
      if (!oldKey || oldKey === newKey || !chatMessages.has(oldKey)) return;
      const oldMessage = chatMessages.get(oldKey);
      if (!chatMessages.has(newKey)) {
        chatMessages.set(newKey, oldMessage);
        const orderIndex = chatOrder.indexOf(oldKey);
        if (orderIndex >= 0) chatOrder[orderIndex] = newKey;
      } else {
        const oldOrderIndex = chatOrder.indexOf(oldKey);
        if (oldOrderIndex >= 0) chatOrder.splice(oldOrderIndex, 1);
      }
      chatMessages.delete(oldKey);
    }

    function handleConversationEvent(event) {
      const type = event?.type;
      const eventItemId = event?.item_id || null;
      const isUserTranscript =
        type === 'conversation.item.input_audio_transcription.delta' ||
        type === 'conversation.item.input_audio_transcription.text' ||
        type === 'conversation.item.input_audio_transcription.completed' ||
        type === 'conversation.item.input_audio_transcription.failed';
      if (isUserTranscript && eventItemId && activeUserItemId &&
          eventItemId !== activeUserItemId) {
        rekeyChatMessage(
          `user:${activeUserItemId}`,
          `user:${eventItemId}`
        );
        activeUserItemId = eventItemId;
      }
      const itemId =
        eventItemId || activeUserItemId || event?.response_id || 'current';

      if (type === 'input_audio_buffer.speech_started') {
        activeUserItemId = eventItemId || `live_${Date.now()}`;
        upsertChatMessage(
          `user:${activeUserItemId}`,
          'user',
          'Listening…',
          false
        );
        return false;
      }
      if (type === 'input_audio_buffer.speech_stopped') {
        const key = `user:${itemId}`;
        const existing = chatMessages.get(key);
        if (!existing || existing.text === 'Listening…') {
          upsertChatMessage(key, 'user', 'Transcribing…', false);
        }
        return false;
      }

      if (type === 'conversation.item.input_audio_transcription.delta' ||
          type === 'conversation.item.input_audio_transcription.text') {
        activeUserItemId = eventItemId || activeUserItemId;
        upsertChatMessage(
          `user:${itemId}`,
          'user',
          `${event.text || ''}${event.stash || ''}`,
          false
        );
        return false;
      }
      if (type === 'conversation.item.input_audio_transcription.completed') {
        const transcript = event.transcript || event.text ||
          (event.item?.content || [])
            .map((part) => part?.transcript || part?.text || '')
            .join(' ')
            .trim();
        if (transcript) {
          upsertChatMessage(`user:${itemId}`, 'user', transcript, true);
        }
        activeUserItemId = null;
        return !!transcript;
      }
      if (type === 'conversation.item.input_audio_transcription.failed') {
        upsertChatMessage(
          `user:${itemId}`,
          'user',
          'Speech was not recognized. Please try again.',
          true
        );
        activeUserItemId = null;
        return false;
      }
      if (type === 'response.audio_transcript.delta' ||
          type === 'response.text.delta') {
        upsertChatMessage(
          `assistant:${itemId}`,
          'assistant',
          event.delta || '',
          false,
          true
        );
        return false;
      }
      if (type === 'response.audio_transcript.done') {
        upsertChatMessage(
          `assistant:${itemId}`,
          'assistant',
          event.transcript || '',
          true
        );
        return true;
      }
      if (type === 'response.text.done') {
        upsertChatMessage(
          `assistant:${itemId}`,
          'assistant',
          event.text || '',
          true
        );
        return true;
      }
      return false;
    }

    function ensureLatencyTurn(trigger = 'speech') {
      if (!currentLatency) {
        currentLatency = {
          turn_index: ++turnSequence,
          trigger,
          recorded_at: new Date().toISOString(),
          user_text: '',
          assistant_text: '',
        };
      }
      return currentLatency;
    }

    function elapsed(start, end) {
      return Number.isFinite(start) && Number.isFinite(end)
        ? Math.max(0, end - start)
        : null;
    }

    function submitLatencyTurn() {
      if (!currentLatency || !sessionId) return;
      const turn = currentLatency;
      currentLatency = null;
      const metric = {
        turn_index: turn.turn_index,
        trigger: turn.trigger,
        recorded_at: turn.recorded_at,
        speech_duration_ms: elapsed(turn.speechStartedAt, turn.speechStoppedAt),
        start_to_first_transcript_ms: elapsed(
          turn.speechStartedAt,
          turn.firstTranscriptAt
        ),
        end_to_first_audio_ms: elapsed(
          turn.speechStoppedAt,
          turn.firstAudioAt
        ),
        interruption_stop_ms: elapsed(
          turn.interruptionStartedAt,
          turn.interruptionStoppedAt
        ),
        end_to_response_ms: elapsed(turn.speechStoppedAt, turn.responseCreatedAt),
        end_to_first_text_ms: elapsed(turn.speechStoppedAt, turn.firstTextAt),
        end_to_transcript_ms: elapsed(turn.speechStoppedAt, turn.transcriptDoneAt),
        response_duration_ms: elapsed(turn.responseCreatedAt, turn.responseDoneAt),
        total_turn_ms: elapsed(
          turn.speechStoppedAt || turn.responseCreatedAt,
          turn.responseDoneAt
        ),
        user_text: turn.user_text,
        assistant_text: turn.assistant_text,
      };
      const request = fetch(
        `${API_BASE}/api/sessions/${encodeURIComponent(sessionId)}/latency`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(metric),
        }
      ).catch((error) => {
        console.warn('Failed to record turn latency:', error);
      }).finally(() => {
        pendingLatencyWrites.delete(request);
      });
      pendingLatencyWrites.add(request);
    }

    function trackLatencyEvent(event) {
      const now = performance.now();
      const type = event?.type;
      if (type === 'input_audio_buffer.speech_started') {
        currentLatency = {
          turn_index: ++turnSequence,
          trigger: 'speech',
          recorded_at: new Date().toISOString(),
          speechStartedAt: now,
          interruptionStartedAt: remoteAudioAudible ? now : null,
          user_text: '',
          assistant_text: '',
        };
      } else if (type === 'input_audio_buffer.speech_stopped') {
        ensureLatencyTurn().speechStoppedAt = now;
      } else if (type === 'conversation.item.input_audio_transcription.delta' ||
                 type === 'conversation.item.input_audio_transcription.text') {
        const turn = ensureLatencyTurn();
        if (!turn.firstTranscriptAt) turn.firstTranscriptAt = now;
        turn.user_text = `${event.text || ''}${event.stash || ''}`;
      } else if (type === 'conversation.item.input_audio_transcription.completed') {
        const turn = ensureLatencyTurn();
        if (!turn.firstTranscriptAt) turn.firstTranscriptAt = now;
        turn.transcriptDoneAt = now;
        turn.user_text = event.transcript || '';
      } else if (type === 'response.created') {
        lastResponseCreatedAt = now;
        const turn = ensureLatencyTurn('idle');
        turn.responseCreatedAt = now;
        turn.responseId = event.response?.id || event.response_id || null;
      } else if (type === 'response.audio_transcript.delta' ||
                 type === 'response.text.delta') {
        const turn = ensureLatencyTurn('idle');
        if (turn.responseId && event.response_id &&
            turn.responseId !== event.response_id) return;
        if (!turn.firstTextAt) turn.firstTextAt = now;
        turn.assistant_text += event.delta || '';
      } else if (type === 'response.audio_transcript.done') {
        const turn = ensureLatencyTurn('idle');
        if (turn.responseId && event.response_id &&
            turn.responseId !== event.response_id) return;
        turn.assistant_text = event.transcript || turn.assistant_text;
      } else if (type === 'response.text.done') {
        const turn = ensureLatencyTurn('idle');
        if (turn.responseId && event.response_id &&
            turn.responseId !== event.response_id) return;
        turn.assistant_text = event.text || turn.assistant_text;
      } else if (type === 'response.done' && currentLatency) {
        const responseId = event.response?.id || event.response_id;
        if (currentLatency.responseId && responseId &&
            currentLatency.responseId !== responseId) return;
        currentLatency.responseDoneAt = now;
        // A tool-call response has no spoken text; wait for the final response.
        if (currentLatency.firstTextAt || currentLatency.assistant_text) {
          submitLatencyTurn();
        }
      }
    }

    async function startRemoteAudioMonitor(stream) {
      if (remoteAudioMonitorRaf) cancelAnimationFrame(remoteAudioMonitorRaf);
      if (remoteAudioContext) {
        try { await remoteAudioContext.close(); } catch {}
      }
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass || !stream.getAudioTracks().length) return;
      remoteAudioContext = new AudioContextClass();
      try { await remoteAudioContext.resume(); } catch {}
      remoteAudioSource = remoteAudioContext.createMediaStreamSource(
        new MediaStream(stream.getAudioTracks())
      );
      remoteAudioAnalyser = remoteAudioContext.createAnalyser();
      remoteAudioAnalyser.fftSize = 1024;
      remoteAudioSource.connect(remoteAudioAnalyser);
      const samples = new Uint8Array(remoteAudioAnalyser.fftSize);

      const monitor = () => {
        if (!remoteAudioAnalyser) return;
        remoteAudioAnalyser.getByteTimeDomainData(samples);
        let energy = 0;
        for (const sample of samples) {
          const normalized = (sample - 128) / 128;
          energy += normalized * normalized;
        }
        const rms = Math.sqrt(energy / samples.length);
        const audible = rms >= 0.015;
        const now = performance.now();

        if (audible) {
          remoteAudioSilenceFrames = 0;
          remoteAudioAudible = true;
          if (currentLatency?.responseCreatedAt && !currentLatency.firstAudioAt) {
            currentLatency.firstAudioAt = now;
          }
        } else if (remoteAudioAudible) {
          remoteAudioSilenceFrames += 1;
          if (remoteAudioSilenceFrames >= 3) {
            remoteAudioAudible = false;
            remoteAudioSilenceFrames = 0;
            if (currentLatency?.interruptionStartedAt &&
                !currentLatency.interruptionStoppedAt) {
              currentLatency.interruptionStoppedAt = now;
            }
          }
        }
        remoteAudioMonitorRaf = requestAnimationFrame(monitor);
      };
      remoteAudioMonitorRaf = requestAnimationFrame(monitor);
    }

    function resetQualityStats() {
      sessionStartedAt = performance.now();
      qualityStats = {
        packetsLost: 0,
        packetsReceived: 0,
        maxJitterMs: 0,
        rttTotalMs: 0,
        rttSamples: 0,
        connectionDisruptions: 0,
      };
    }

    async function collectWebRtcStats() {
      if (!pc || !qualityStats) return;
      try {
        const reports = await pc.getStats();
        reports.forEach((report) => {
          if (report.type === 'inbound-rtp' && report.kind === 'audio') {
            qualityStats.packetsLost = Math.max(
              qualityStats.packetsLost,
              Number(report.packetsLost || 0)
            );
            qualityStats.packetsReceived = Math.max(
              qualityStats.packetsReceived,
              Number(report.packetsReceived || 0)
            );
            qualityStats.maxJitterMs = Math.max(
              qualityStats.maxJitterMs,
              Number(report.jitter || 0) * 1000
            );
          }
          if (report.type === 'candidate-pair' &&
              report.state === 'succeeded' &&
              report.currentRoundTripTime != null) {
            qualityStats.rttTotalMs +=
              Number(report.currentRoundTripTime) * 1000;
            qualityStats.rttSamples += 1;
          }
        });
      } catch (error) {
        console.warn('Unable to read WebRTC stats:', error);
      }
    }

    function startQualityMonitoring() {
      resetQualityStats();
      if (qualityStatsTimer) clearInterval(qualityStatsTimer);
      qualityStatsTimer = setInterval(collectWebRtcStats, 5000);
    }

    function buildSessionQualityMetric() {
      if (!qualityStats || !sessionStartedAt) return null;
      const totalPackets =
        qualityStats.packetsReceived + qualityStats.packetsLost;
      return {
        recorded_at: new Date().toISOString(),
        duration_minutes: (performance.now() - sessionStartedAt) / 60000,
        packets_received: qualityStats.packetsReceived,
        packets_lost: qualityStats.packetsLost,
        packet_loss_percent: totalPackets > 0
          ? qualityStats.packetsLost / totalPackets * 100
          : 0,
        max_jitter_ms: qualityStats.maxJitterMs,
        avg_rtt_ms: qualityStats.rttSamples > 0
          ? qualityStats.rttTotalMs / qualityStats.rttSamples
          : null,
        connection_disruptions: qualityStats.connectionDisruptions,
      };
    }

    function scheduleTranscriptionFailureFallback(event, channel) {
      if (transcriptionFallbackTimer) {
        clearTimeout(transcriptionFallbackTimer);
      }
      const failureAt = performance.now();
      const itemId =
        event?.item_id || activeUserItemId || `failed_${Date.now()}`;
      upsertChatMessage(
        `user:${itemId}`,
        'user',
        'Speech was not recognized. Please try again.',
        true
      );
      activeUserItemId = null;
      transcriptionFallbackTimer = setTimeout(() => {
        transcriptionFallbackTimer = 0;
        if (!pc || channel.readyState !== 'open') return;
        if (lastResponseCreatedAt >= failureAt) return;
        const fallbackRequest = {
          event_id: `event_retry_${Date.now()}`,
          type: 'response.create',
        };
        channel.send(JSON.stringify(fallbackRequest));
        pushEventFromDataChannel(fallbackRequest);
      }, 1000);
    }

    async function handleRealtimeTool(event, channel) {
      const callId = event?.call_id;
      if (!callId || processedToolCallIds.has(callId)) return;
      processedToolCallIds.add(callId);

      let argumentsObject;
      try {
        argumentsObject = JSON.parse(event.arguments || '{}');
      } catch {
        argumentsObject = {};
      }

      let result;
      try {
        if (event?.name !== 'update_learner_level') {
          result = {
            applied: false,
            reason: 'Unsupported tool. Continue the conversation normally.',
          };
        } else if (!sessionId) {
          result = {
            applied: false,
            reason: 'The session is unavailable. Continue at the current level.',
          };
        } else {
          await Promise.allSettled([...pendingEventWrites]);
          result = await apiRequest(
            `/api/sessions/${encodeURIComponent(sessionId)}/tools/learner-level`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ arguments: argumentsObject }),
            }
          );
          if (result.learner_profile?.label) {
            levelBadge.textContent = result.learner_profile.label;
          }
        }
      } catch (error) {
        console.error('Realtime tool failed:', error);
        result = {
          applied: false,
          reason: 'Level review is temporarily unavailable. Continue the conversation normally at the current level.',
        };
      }

      if (!channel || channel.readyState !== 'open') return;
      const toolOutput = {
        event_id: `event_tool_${Date.now()}`,
        type: 'conversation.item.create',
        item: {
          type: 'function_call_output',
          call_id: callId,
          output: JSON.stringify(result),
        },
      };
      channel.send(JSON.stringify(toolOutput));
      pushEventFromDataChannel(toolOutput);

      const createResponse = {
        event_id: `event_response_${Date.now()}`,
        type: 'response.create',
      };
      channel.send(JSON.stringify(createResponse));
      pushEventFromDataChannel(createResponse);
    }

    // ===== Events panel =====
    const events = [];
    function nowTs() { return new Date().toLocaleTimeString(); }

    function renderEvents() {
      eventsDiv.innerHTML = "";
      if (events.length === 0) {
        const empty = document.createElement("div");
        empty.className = "events-empty";
        empty.textContent = "Waiting for events...";
        eventsDiv.appendChild(empty);
        return;
      }

      for (const item of events) {
        const { event, timestamp } = item;
        const isClient = event?.type?.includes("update") || event?.type?.includes("create");

        const wrap = document.createElement("div");
        wrap.className = "event-item";

        const header = document.createElement("div");
        header.className = "event-header";

        const arrow = document.createElement("span");
        arrow.className = "event-arrow " + (isClient ? "client" : "server");
        arrow.textContent = isClient ? "↓" : "↑";

        const label = document.createElement("span");
        label.className = "event-label";
        const who = isClient ? "client" : "server";
        const type = event?.type ?? "message";
        label.textContent = `${who}: ${type}`;

        const time = document.createElement("span");
        time.className = "event-time";
        time.textContent = timestamp;

        const body = document.createElement("div");
        body.className = "event-body";
        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(event, null, 2);
        body.appendChild(pre);

        header.onclick = () => { body.style.display = body.style.display === "block" ? "none" : "block"; };

        header.appendChild(arrow);
        header.appendChild(label);
        header.appendChild(time);
        wrap.appendChild(header);
        wrap.appendChild(body);

        eventsDiv.appendChild(wrap);
      }
    }

    function clearUIEvents() { events.length = 0; renderEvents(); }
    function pushEventFromDataChannel(eventObj) {
      const ts = eventObj.timestamp || nowTs();
      if (!eventObj.timestamp) eventObj.timestamp = ts;
      events.unshift({ event: eventObj, timestamp: ts });
      renderEvents();
    }

    function normalizeSdpForSetRemote(sdp) {
      sdp = String(sdp).trim().replace(/\r?\n/g, "\r\n");
      if (!sdp.endsWith("\r\n")) sdp += "\r\n";
      return sdp;
    }

    // ===== WebRTC =====
    startBtn.onclick = () => startSession().catch(async (error) => {
      console.error("startSession error:", error);
      await endSession(true);
      setStatus(error.message || 'Unable to start session', 'error');
      alert(error.message || 'Unable to start session');
    });
    endBtn.onclick = () => endSession();
    newConversationBtn.onclick = async () => {
      if (pc) {
        alert('End the current session before starting a new conversation.');
        return;
      }
      if (conversationId) {
        try {
          await apiRequest(`/api/conversations/${encodeURIComponent(conversationId)}`, {
            method: 'DELETE',
          });
        } catch (error) {
          console.warn('Failed to delete saved conversation:', error);
        }
      }
      conversationId = null;
      localStorage.removeItem('englishCoachConversationId');
      renderConversation([]);
      setStatus('New conversation ready', '');
    };
    setAnswerBtn.onclick = () => setRemoteAnswerFromUI().catch(err => console.log("setRemoteAnswer error:", err));
    copyOfferBtn.onclick = async () => {
      const txt = offerBox.value;
      if (!txt) return;
      await navigator.clipboard.writeText(txt);
      alert("Offer SDP copied");
    };
    downloadBtn.onclick = () => {
      if (audioBlob) downloadBlob(audioBlob, 'remote-audio.webm');
      else alert('No audio recording available');
    };

    async function startSession() {
      if (pc) return;
      setStatus('Creating backend session...', 'connecting');
      const backendSession = await createBackendSession();
      sessionId = backendSession.session_id;
      conversationId = backendSession.conversation_id;
      localStorage.setItem('englishCoachConversationId', conversationId);
      sessionConfig = backendSession.session_config;
      levelBadge.textContent =
        backendSession.learner_profile?.label || 'CET-4 (B1-B2)';
      renderConversation(backendSession.history || []);
      processedToolCallIds.clear();
      activeUserItemId = null;
      turnSequence = 0;
      currentLatency = null;
      startBtn.disabled = true;

      pc = new RTCPeerConnection({ iceServers: [] });
      startQualityMonitoring();
      clearUIEvents();
      setStatus('Requesting microphone access...', 'connecting');

      offerBox.value = "";
      answerBox.value = "";
      setAnswerBtn.disabled = true;
      copyOfferBtn.disabled = true;

      endBtn.disabled = false;
      downloadBtn.disabled = true;

      pc.onconnectionstatechange = () => {
        if (!pc) return;
        if (qualityStats &&
            ["failed", "disconnected"].includes(pc.connectionState) &&
            qualityStats.lastConnectionState !== pc.connectionState) {
          qualityStats.connectionDisruptions += 1;
        }
        if (qualityStats) {
          qualityStats.lastConnectionState = pc.connectionState;
        }
        if (pc.connectionState === 'connected') {
          setStatus('Connected. Start speaking.', 'connected');
        } else if (["failed", "closed", "disconnected"].includes(pc.connectionState)) {
          console.log("onconnectionstatechange:", pc.connectionState);
          endSession(true);
        }
      };

      pc.ontrack = async (e) => {
        const stream = e.streams[0];
        ensureHiddenAudioEl();
        hiddenRemoteAudioEl.srcObject = stream;
        try { await hiddenRemoteAudioEl.play(); } catch {}
        await startRemoteAudioMonitor(stream);
        startRecordingRemoteStream(stream);
      };

      const wantVideo = !!sendVideoCheckbox.checked;

      const localPreviewFps = 30;
      const sendFps = 2;

      const constraints = wantVideo
        ? {
            audio: true,
            video: {
              facingMode: { ideal: "user" },
              frameRate: { ideal: localPreviewFps, max: localPreviewFps },
              width: { ideal: 640 },
              height: { ideal: 480 },
            }
          }
        : { audio: true };

      localStream = await navigator.mediaDevices.getUserMedia(constraints);

      const videoSection = document.getElementById('videoSection');
      if (wantVideo) {
        localVideo.srcObject = localStream;
        localVideo.style.display = "block";
        videoSection.style.display = "";
        try { await localVideo.play(); } catch {}
      } else {
        localVideo.srcObject = null;
        localVideo.style.display = "none";
        videoSection.style.display = "none";
      }

      gatedAudioTracks = [];
      gatedVideoTracks = [];

      localStream.getAudioTracks().forEach(t => {
        pc.addTrack(t, localStream);
        gatedAudioTracks.push(t);
      });

      if (wantVideo) {
        if (sendRafId) cancelAnimationFrame(sendRafId);
        sendRafId = 0;
        if (sendCanvasStream) sendCanvasStream.getTracks().forEach(t => t.stop());
        sendCanvasStream = null;
        sendCanvasCtx = null;
        sendCanvas = null;

        const settings = localStream.getVideoTracks()[0].getSettings();
        sendCanvas = document.createElement("canvas");
        sendCanvas.width = settings.width || 640;
        sendCanvas.height = settings.height || 480;
        sendCanvasCtx = sendCanvas.getContext("2d", { alpha: false });

        sendCanvasStream = sendCanvas.captureStream(sendFps);
        const lowFpsTrack = sendCanvasStream.getVideoTracks()[0];
        pc.addTrack(lowFpsTrack, sendCanvasStream);
        gatedVideoTracks.push(lowFpsTrack);

        const pump = () => {
          if (!sendCanvasCtx || !sendCanvas) return;
          try { sendCanvasCtx.drawImage(localVideo, 0, 0, sendCanvas.width, sendCanvas.height); } catch {}
          sendRafId = requestAnimationFrame(pump);
        };
        sendRafId = requestAnimationFrame(pump);
      }

      gateMedia(false);

      audioSender = pc.getSenders().find(s => s.track?.kind === 'audio');
      videoSender = pc.getSenders().find(s => s.track?.kind === 'video');
      audioTrack = audioSender?.track;
      videoTrack = videoSender?.track;

      await audioSender?.replaceTrack(null);
      await videoSender?.replaceTrack(videoTrack ? null : undefined);

      const dc = pc.createDataChannel('oai-events');
      let greetingRequested = false;

      dc.onopen = () => console.log("DC open");
      dc.onmessage = (e) => {
        handleDcMessage(e.data, dc);
      };

      pc.ondatachannel = (event) => {
        const ch = event.channel;
        ch.onmessage = (e) => {
            handleDcMessage(e.data, ch);
        };
      };

      function handleDcMessage(data, channel) {
          let obj;
          try { obj = JSON.parse(data); }
          catch (err) {
            pushEventFromDataChannel({ type: "raw", data: String(data), parseError: String(err) });
            return;
          }
          pushEventFromDataChannel(obj);
          trackLatencyEvent(obj);
          if (handleConversationEvent(obj)) rememberEvent(obj);
          if (obj?.type === 'response.function_call_arguments.done') {
            handleRealtimeTool(obj, channel);
          }
          if (obj?.type === 'conversation.item.input_audio_transcription.failed') {
            scheduleTranscriptionFailureFallback(obj, channel);
          }

          if (obj?.type === "session.created") {
            console.log("Session created, opening media gate.");
            gateMedia(true);
            if(audioSender) audioSender.replaceTrack(audioTrack);
            if(videoSender && videoTrack) videoSender.replaceTrack(videoTrack);

            sendUpdate(channel);
          }
          if (obj?.type === 'session.updated' && !greetingRequested) {
            greetingRequested = true;
            const greetingRequest = {
              event_id: `event_greeting_${Date.now()}`,
              type: 'response.create',
            };
            channel.send(JSON.stringify(greetingRequest));
            pushEventFromDataChannel(greetingRequest);
            setStatus('AI is greeting you...', 'connecting');
          }
          if (obj?.type === 'response.done') {
            setStatus('Connected. Your turn.', 'connected');
          }
      }

      pc.onicegatheringstatechange = () => {
        if (!pc) return;
        if (pc.iceGatheringState === "complete" && pc.localDescription?.sdp) {
          const sdp = pc.localDescription.sdp;
          offerBox.value = sdp;
          copyOfferBtn.disabled = false;
          setAnswerBtn.disabled = false;

          setStatus('Offer SDP generated. Requesting Answer through local proxy...', 'connecting');
          console.log("ICE Gathering Complete. Ready to set remote description.");
          requestAnswerFromProxy(sdp).catch((error) => {
            console.error(error);
            setStatus(error.message, 'error');
            alert(error.message);
          });
        }
      };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
    }

    async function requestAnswerFromProxy(offerSdp) {
      const response = await fetch(`${API_BASE}/api/realtime?session_id=${encodeURIComponent(sessionId)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/sdp' },
        body: offerSdp,
      });
      const body = await response.text();
      if (!response.ok) {
        let message = body;
        try { message = JSON.parse(body).error || body; } catch {}
        throw new Error(`Realtime request failed (${response.status}): ${message}`);
      }
      answerBox.value = body;
      await setRemoteAnswerFromUI();
    }

    async function setRemoteAnswerFromUI() {
      if (!pc) return alert('Click "Start Session" first to generate the Offer.');
      const txt = answerBox.value.trim();
      if (!txt) return alert("Please paste the Answer SDP");

      const answerSdp = normalizeSdpForSetRemote(txt);
      try {
          await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
          setStatus('Establishing connection...', 'connecting');
      } catch (e) {
          alert("Failed to set Answer: " + e.message);
          console.error(e);
      }
    }

    async function endSession(silent = false) {
      if (finalizingSession) return;
      finalizingSession = true;
      const closingSessionId = sessionId;
      await collectWebRtcStats();
      const sessionQualityMetric = buildSessionQualityMetric();
      if (qualityStatsTimer) {
        clearInterval(qualityStatsTimer);
        qualityStatsTimer = 0;
      }
      if (sendRafId) cancelAnimationFrame(sendRafId);
      sendRafId = 0;
      if (transcriptionFallbackTimer) {
        clearTimeout(transcriptionFallbackTimer);
        transcriptionFallbackTimer = 0;
      }

      if (sendCanvasStream) {
        sendCanvasStream.getTracks().forEach(t => t.stop());
      }
      sendCanvasStream = null;
      sendCanvasCtx = null;
      sendCanvas = null;

      try { if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop(); } catch {}
      mediaRecorder = null;

      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      localVideo.srcObject = null;
      localVideo.style.display = "none";
      document.getElementById('videoSection').style.display = "none";

      if (pc) {
        try { pc.close(); } catch {}
        pc = null;
      }

      gatedAudioTracks = [];
      gatedVideoTracks = [];

      if (hiddenRemoteAudioEl) {
        try { hiddenRemoteAudioEl.pause(); } catch {}
        hiddenRemoteAudioEl.srcObject = null;
        hiddenRemoteAudioEl.remove();
        hiddenRemoteAudioEl = null;
      }
      if (remoteAudioMonitorRaf) {
        cancelAnimationFrame(remoteAudioMonitorRaf);
        remoteAudioMonitorRaf = 0;
      }
      if (remoteAudioSource) {
        try { remoteAudioSource.disconnect(); } catch {}
        remoteAudioSource = null;
      }
      remoteAudioAnalyser = null;
      remoteAudioAudible = false;
      if (remoteAudioContext) {
        try { await remoteAudioContext.close(); } catch {}
        remoteAudioContext = null;
      }

      sessionId = null;
      sessionConfig = null;
      activeUserItemId = null;
      processedToolCallIds.clear();

      startBtn.disabled = true;
      newConversationBtn.disabled = true;
      endBtn.disabled = true;
      setAnswerBtn.disabled = true;
      copyOfferBtn.disabled = true;
      downloadBtn.disabled = !audioBlob;

      if (closingSessionId) {
        if (!silent) setStatus('Closing session...', 'connecting');
        await Promise.allSettled([...pendingEventWrites]);
        await Promise.allSettled([...pendingLatencyWrites]);
        try {
          if (sessionQualityMetric) {
            await apiRequest(
              `/api/sessions/${encodeURIComponent(closingSessionId)}/quality`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(sessionQualityMetric),
              }
            );
          }
          await apiRequest(
            `/api/sessions/${encodeURIComponent(closingSessionId)}`,
            { method: 'DELETE' }
          );
        } catch (error) {
          console.warn('Failed to close backend session:', error);
        }
      }
      startBtn.disabled = false;
      newConversationBtn.disabled = false;
      finalizingSession = false;
      setStatus('Disconnected', '');
      if (!silent) console.log("session ended");
    }

    function ensureHiddenAudioEl() {
      if (hiddenRemoteAudioEl) return;
      hiddenRemoteAudioEl = document.createElement("audio");
      hiddenRemoteAudioEl.autoplay = true;
      hiddenRemoteAudioEl.playsInline = true;
      hiddenRemoteAudioEl.muted = false;
      hiddenRemoteAudioEl.style.display = "none";
      document.body.appendChild(hiddenRemoteAudioEl);
    }

    function startRecordingRemoteStream(remoteStream) {
      const audioTracks = remoteStream.getAudioTracks();
      if (!audioTracks.length) return;

      const audioStream = new MediaStream(audioTracks);
      recordedChunks = [];
      audioBlob = null;
      downloadBtn.disabled = true;

      try {
        mediaRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });
      } catch (err) {
        console.log("MediaRecorder create failed:", err);
        return;
      }

      mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) recordedChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        audioBlob = new Blob(recordedChunks, { type: 'audio/webm' });
        downloadBtn.disabled = !audioBlob || audioBlob.size === 0;
      };

      mediaRecorder.start();
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      URL.revokeObjectURL(url);
      a.remove();
    }

    renderEvents();

    const stickyTop = document.querySelector('.sticky-top');
    window.addEventListener('scroll', () => {
      stickyTop.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });
</script>
</body>
</html>
